name: Setup CI
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
  issues: write
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "uptime"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - uses: upptime/uptime-monitor@v1.41.0
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
